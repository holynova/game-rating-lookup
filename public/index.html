<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f4f1ea" />
    <title>游戏评分查询</title>
    <link rel="stylesheet" href="styles.css" />
    <script>
      window.GAME_RATING_API_BASE = "https://game-rating-lookup-api.holynova.workers.dev";
    </script>
    <script src="version.js"></script>
  </head>
  <body>
    <main class="shell">
      <div class="top-meta">
        <span id="build-version" class="build-version">build --</span>
        <button id="rules-open" class="meta-button" type="button">规则</button>
        <a class="repo-link" href="https://github.com/holynova/game-rating-lookup" target="_blank" rel="noreferrer">GitHub</a>
      </div>
      <section class="intro" aria-labelledby="page-title">
        <p class="kicker">Steam / 小黑盒</p>
        <h1 id="page-title">装备鉴定台</h1>
        <p class="lede">投入游戏名，鉴定评分词条。</p>
      </section>

      <section class="lookup-panel" aria-label="查询表单">
        <form id="search-form" class="search-form">
          <label for="game-input">待鉴定物品</label>
          <div class="input-row">
            <textarea
              id="game-input"
              name="q"
              rows="3"
              autocomplete="off"
              spellcheck="false"
              placeholder="Hades, 赛博朋克2077, 艾尔登法环"
              required
            ></textarea>
            <button type="submit">鉴定</button>
          </div>
        </form>
      </section>

      <section class="rating-source" aria-label="评分基准">
        <span>评分基准</span>
        <div class="source-toggle" role="group" aria-label="评分基准">
          <button class="source-button is-active" type="button" data-rating-source="steam">Steam</button>
          <button class="source-button" type="button" data-rating-source="heybox">小黑盒</button>
        </div>
      </section>

      <section id="status" class="status" aria-live="polite"></section>
      <section id="progress" class="progress" aria-label="查询进度" hidden>
        <div class="progress-track">
          <div id="progress-fill" class="progress-fill"></div>
        </div>
        <span id="progress-label" class="progress-label">0 / 0</span>
      </section>

      <nav class="view-tabs" aria-label="结果视图">
        <button class="tab-button is-active" type="button" data-view="search">本次结果</button>
        <button class="tab-button" type="button" data-view="history">历史</button>
      </nav>

      <section id="results" class="results" data-panel="search" hidden>
        <div id="result-list" class="result-list"></div>
      </section>

      <section id="history-results" class="results" data-panel="history" hidden>
        <div class="grade-filter" aria-label="历史等级筛选">
          <button class="filter-button is-active" type="button" data-grade-filter="all">全部</button>
          <button class="filter-button" type="button" data-grade-filter="white">普通</button>
          <button class="filter-button" type="button" data-grade-filter="green">优秀</button>
          <button class="filter-button" type="button" data-grade-filter="blue">稀有</button>
          <button class="filter-button" type="button" data-grade-filter="purple">史诗</button>
          <button class="filter-button" type="button" data-grade-filter="gold">传奇</button>
        </div>
        <div id="history-result-list" class="result-list"></div>
      </section>
    </main>

    <dialog id="rules-dialog" class="rules-dialog" aria-labelledby="rules-title">
      <form method="dialog" class="rules-panel">
        <div class="rules-head">
          <h2 id="rules-title">鉴定规则</h2>
          <button class="dialog-close" type="submit" aria-label="关闭">×</button>
        </div>
        <p>输入一个或多个游戏名，鉴定台会查询 Steam 与小黑盒评分，并保留历史结果。</p>
        <p>评分基准决定卡片主色、右上角徽章和历史等级筛选。切到小黑盒时，优先按小黑盒 10 分制评分显示。</p>
        <p>装备颜色使用人数门槛：95%/9.5 且样本足够才是传奇，85%/8.5 且样本足够才是史诗，小样本高分不会直接变金。</p>
        <p>如果平台识别名和输入名差异较大，会标记“疑似错位”，需要打开平台链接人工确认。</p>
      </form>
    </dialog>

    <script src="app.js" type="module"></script>
  </body>
</html>
